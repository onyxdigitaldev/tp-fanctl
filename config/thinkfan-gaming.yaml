##############################################
# ThinkPad — Gaming Fan Curve
# Aggressive cooling, prioritize thermals
#
# Same sensor config as quiet profile.
# See thinkfan-quiet.yaml for sensor setup notes.
##############################################

sensors:
  - hwmon: /sys/class/hwmon
    name: coretemp
    indices: [1, 2, 3, 4, 5]

fans:
  - tpacpi: /proc/acpi/ibm/fan

levels:
  - [0, 0, 40]
  - ["level 2", 37, 48]
  - ["level 3", 45, 53]
  - ["level 5", 50, 60]
  - ["level 6", 57, 68]
  - ["level 7", 65, 75]
  - ["level disengaged", 72, 255]
